name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'custom_components/dmx_diodeled/manifest.json'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get Version
        id: version
        run: |
          VERSION=$(jq -r .version custom_components/dmx_diodeled/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Check if Version Changed
        id: version_changed
        run: |
          # Use github.event.before if available, otherwise fallback to HEAD^1
          BEFORE_SHA="${{ github.event.before }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="HEAD^1"
          fi

          # Ensure we have the before SHA available for git show
          git fetch origin $BEFORE_SHA --depth=1 || git fetch origin main --depth=2

          PREV_VERSION=$(git show $BEFORE_SHA:custom_components/dmx_diodeled/manifest.json | jq -r .version || echo "none")
          if [ "${{ steps.version.outputs.version }}" != "$PREV_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Check if Tag Exists
        id: check_tag
        if: steps.version_changed.outputs.changed == 'true'
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q "refs/tags/"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Create Release
        if: steps.version_changed.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "Release v${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'custom_components/dmx_diodeled/manifest.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Get Version
        id: version
        run: |
          VERSION=$(jq -r .version custom_components/dmx_diodeled/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Check if Version Changed
        id: version_changed
        run: |
          # Default to changed=true for manual dispatch
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # For pushes, check if version changed vs previous commit
          # fetch-depth: 2 ensures HEAD^1 is available
          PREV_VERSION=$(git show HEAD^1:custom_components/dmx_diodeled/manifest.json | jq -r .version || echo "none")
          if [ "${{ steps.version.outputs.version }}" != "$PREV_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Check if Tag Exists
        id: check_tag
        if: steps.version_changed.outputs.changed == 'true'
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q "refs/tags/"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Create Release
        if: steps.version_changed.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "Release v${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

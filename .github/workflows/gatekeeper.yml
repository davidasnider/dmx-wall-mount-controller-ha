name: PR Gatekeeper

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, closed]
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  gatekeeper-check:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - name: Check for approval label
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ready-to-merge') }}" == "true" ]]; then
            echo "Label found! The gates are open."
            exit 0
          else
            echo "Waiting for 'ready-to-merge' label."
            echo "Review the comments from Copilot/antigravity, then add the label to proceed."
            exit 1
          fi

  automerge:
    needs: [gatekeeper-check]
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - name: Enable auto-merge for PR
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

  release:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - uses: actions/checkout@v4
      - name: Create Release if version changed
        run: |
          # Check if manifest.json was modified in this PR
          if gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files[].path' | grep -q 'custom_components/dmx_diodeled/manifest.json'; then
            VERSION=$(jq -r .version custom_components/dmx_diodeled/manifest.json)
            
            # Only create release if the tag doesn't exist
            if ! git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q "refs/tags/"; then
              echo "Creating release for v$VERSION..."
              gh release create "v$VERSION" --target "${{ github.event.pull_request.merge_commit_sha }}" --title "Release v$VERSION" --generate-notes
            else
              echo "Version v$VERSION already released, skipping."
            fi
          else
            echo "manifest.json was not modified in this PR, skipping release."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

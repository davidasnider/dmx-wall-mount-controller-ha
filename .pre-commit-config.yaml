repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package\.lock\.json|uv\.lock

  - repo: local
    hooks:
      - id: pytest
        name: run local tests
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false
